name: Neuro-Quant Ghost Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Verify Files
        run: ls -la # This will show us if requirements.txt actually exists

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz pandas # We list them here directly just in case

      - name: Run bot_worker.py
        env:
          AV_KEY: ${{ secrets.AV_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot_worker.py